<!DOCTYPE html>
<html lang="es" data-bs-theme="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Álbum Mundial 2026 - Control de Estampas</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <!-- SweetAlert2 -->
    <link href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css" rel="stylesheet">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="style.css">
    <link rel="icon"
        href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>⚽</text></svg>">
</head>

<body>
    <div class="app-container">
        <!-- Header -->
        <header class="app-header text-center py-4 mb-4 position-relative">
            <div class="top-controls d-flex justify-content-end gap-2 align-items-center">
                <!-- Dropdown de Idioma -->
                <div class="dropdown">
                    <button class="btn btn-sm btn-outline-secondary dropdown-toggle" type="button" id="btn-lang" data-bs-toggle="dropdown" aria-expanded="false" title="Cambiar Idioma">
                        <i class="fas fa-globe"></i> <span id="current-lang">ES</span>
                    </button>
                    <ul class="dropdown-menu dropdown-menu-end" aria-labelledby="btn-lang">
                        <li><a class="dropdown-item lang-option active" href="#" data-lang="es">🇪🇸 Español (ES)</a></li>
                        <li><a class="dropdown-item lang-option" href="#" data-lang="en">🇬🇧 English (EN)</a></li>
                    </ul>
                </div>
                <!-- Botón de Tema -->
                <button class="btn btn-sm btn-outline-info" id="btn-theme" title="Cambiar Tema">
                    <i class="fas fa-sun"></i>
                </button>
                <button class="btn btn-sm btn-outline-danger" id="btn-reset" title="Reiniciar Álbum">
                    <i class="fas fa-trash-alt"></i> <span data-i18n="reset">Reiniciar</span>
                </button>
            </div>
            <div class="logo-container">
                <h1 class="display-4 fw-bold we-are-26-title">
                    <span class="we">WE</span>
                    <span class="are">ARE</span>
                    <span class="number">26</span>
                </h1>
                <p class="lead subtitle" data-i18n="title">Control de Estampas Del Albúm del Mundial Panini 2026</p>
            </div>
        </header>

        <div class="container-fluid px-4">
            <!-- Progress Bar -->
            <div class="row mb-4">
                <div class="col-12">
                    <div class="glass-card p-3 progress-container">
                        <div class="d-flex justify-content-between mb-2">
                            <span class="fw-bold" data-i18n="progress">Progreso del Álbum</span>
                            <span id="progress-text" class="fw-bold fs-5 text-accent">0%</span>
                        </div>
                        <div class="progress" style="height: 25px;">
                            <div id="progress-bar"
                                class="progress-bar progress-bar-striped progress-bar-animated bg-accent"
                                role="progressbar" style="width: 0%;" aria-valuenow="0" aria-valuemin="0"
                                aria-valuemax="100"></div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Stats Dashboard -->
            <div class="row mb-4 g-3">
                <div class="col-6 col-md-3">
                    <div class="stat-card glass-card" style="cursor: pointer;" onclick="setViewMode('ALL')">
                        <div class="stat-icon bg-primary-gradient"><i class="fas fa-book-open"></i></div>
                        <div class="stat-info">
                            <h3 id="stat-total">993</h3>
                            <p data-i18n="total">Total Álbum</p>
                        </div>
                    </div>
                </div>
                <div class="col-6 col-md-3">
                    <div class="stat-card glass-card" style="cursor: pointer;" onclick="setViewMode('OBTAINED')">
                        <div class="stat-icon bg-success-gradient"><i class="fas fa-check-circle"></i></div>
                        <div class="stat-info">
                            <h3 id="stat-obtained">0</h3>
                            <p data-i18n="obtained">Obtenidas</p>
                        </div>
                    </div>
                </div>
                <div class="col-6 col-md-3">
                    <div class="stat-card glass-card" style="cursor: pointer;" onclick="setViewMode('REPEATED')">
                        <div class="stat-icon bg-warning-gradient"><i class="fas fa-copy"></i></div>
                        <div class="stat-info">
                            <h3 id="stat-repeated">0</h3>
                            <p data-i18n="repeated">Repetidas</p>
                        </div>
                    </div>
                </div>
                <div class="col-6 col-md-3">
                    <div class="stat-card glass-card" style="cursor: pointer;" onclick="setViewMode('MISSING')">
                        <div class="stat-icon bg-danger-gradient"><i class="fas fa-search-minus"></i></div>
                        <div class="stat-info">
                            <h3 id="stat-missing">993</h3>
                            <p data-i18n="missing">Faltantes</p>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Main Content -->
            <div class="row g-4">
                <!-- Left Column: Controls -->
                <div class="col-lg-4">
                    <!-- Add Sticker -->
                    <div class="glass-card p-4 mb-4 control-panel">
                        <h4 class="mb-3"><i class="fas fa-plus-circle text-accent"></i> <span data-i18n="register">Registrar Estampa</span></h4>
                        <form id="add-form" class="needs-validation" novalidate>
                            <div class="mb-3">
                                <label for="sticker-number" class="form-label" data-i18n="codeLabel">Código de Estampa (Ej. MEX 1)</label>
                                <div class="input-group input-group-lg">
                                    <span class="input-group-text"><i class="fas fa-hashtag"></i></span>
                                    <input type="text" class="form-control" id="sticker-number" required
                                        data-i18n-placeholder="codePlaceholder" placeholder="Ej. MEX 1" autocomplete="off" style="text-transform: uppercase;">
                                    <button class="btn btn-accent" type="submit" data-i18n="addBtn">Agregar</button>
                                </div>
                            </div>
                            <div class="form-check form-switch mb-3">
                                <input class="form-check-input" type="checkbox" role="switch" id="is-repeated">
                                <label class="form-check-label" for="is-repeated" data-i18n="isRep">Es repetida</label>
                            </div>
                        </form>
                    </div>

                    <!-- Search -->
                    <div class="glass-card p-4 search-panel">
                        <h4 class="mb-3"><i class="fas fa-search text-info"></i> <span data-i18n="searchTitle">Buscar Estampa</span></h4>
                        <div class="input-group">
                            <input type="text" class="form-control" id="search-input"
                                data-i18n-placeholder="searchPlaceholder" placeholder="Buscar estampa (Ej. FWC 5)..." autocomplete="off"
                                style="text-transform: uppercase;">
                            <button class="btn btn-outline-info" type="button" id="search-btn"><i
                                    class="fas fa-search"></i></button>
                        </div>
                        <div id="search-result" class="mt-3 text-center" style="display: none;"></div>
                    </div>
                </div>

                <!-- Middle Column: Album Grid -->
                <div class="col-lg-5" id="album-panel">
                    <div class="glass-card p-4 h-100 data-panel">
                        <div class="d-flex justify-content-between align-items-center mb-3 flex-wrap gap-2">
                            <h4 class="m-0" id="album-title"><i class="fas fa-th text-info"></i> <span id="album-title-text" data-i18n="album">Álbum</span></h4>
                            <select id="section-filter"
                                class="form-select form-select-sm w-auto bg-dark text-white border-secondary">
                                <option value="ALL" data-i18n="allSections">Todas las secciones</option>
                            </select>
                        </div>
                        <div class="missing-grid" id="album-list">
                            <!-- Populated by JS -->
                        </div>
                    </div>
                </div>

                <!-- Right Column: Repeated -->
                <div class="col-lg-3" id="repeated-panel">
                    <div class="glass-card p-4 h-100 data-panel">
                        <div class="d-flex justify-content-between align-items-center mb-3">
                            <h4 class="m-0"><i class="fas fa-layer-group text-warning"></i> <span data-i18n="repeatedTitle">Repetidas</span></h4>
                            <div>
                                <button class="btn btn-sm btn-outline-light me-1" id="sort-repeated" title="Ordenar"><i
                                        class="fas fa-sort-numeric-down"></i></button>
                                <span class="badge bg-warning text-dark rounded-pill" id="badge-repeated">0</span>
                            </div>
                        </div>
                        <ul class="list-group list-group-flush repeated-list" id="repeated-list">
                            <!-- Populated by JS -->
                            <li class="list-group-item text-center text-muted empty-msg" data-i18n="noRepeated">No hay repetidas aún</li>
                        </ul>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Audio Effects -->
    <audio id="sound-add" src="https://assets.mixkit.co/active_storage/sfx/2013/2013-preview.mp3"
        preload="auto"></audio>
    <audio id="sound-error" src="https://assets.mixkit.co/active_storage/sfx/2955/2955-preview.mp3"
        preload="auto"></audio>
    <audio id="sound-celebrate" src="https://assets.mixkit.co/active_storage/sfx/2000/2000-preview.mp3"
        preload="auto"></audio>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <!-- Canvas Confetti -->
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <!-- App Script -->
    <script src="app.js"></script>
</body>

</html>
